{{- if .Values.httpServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.httpServer.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.httpServer.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.httpServer.name }}
    spec:
      containers:
        - name: http-server
          image: "{{ .Values.httpServer.image.repository }}:{{ .Values.httpServer.image.tag }}"
          imagePullPolicy: {{ .Values.httpServer.image.pullPolicy }}
          env:
            - name: HTTP_PORT
              value: {{ .Values.httpServer.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.httpServer.port }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.httpServer.name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.httpServer.name }}
  ports:
    - name: http
      port: {{ .Values.httpServer.port }}
      targetPort: http
{{- end }}
