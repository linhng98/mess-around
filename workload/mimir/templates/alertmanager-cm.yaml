apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-alertmanager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-alertmanager
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        annotations:
          k8s-sidecar-target-directory: /alert-rules/homelab
        labels:
          mimir_alertmanager_configs: "1"
      data:
        homelab.yaml: |
          route:
            receiver: blackhole
            routes:
              - receiver: homelab
                matchers:
                  - cluster = homelab
                  - ignore != true
              - receiver: blackhole
                continue: false
          inhibit_rules:
            - target_matchers:
                - ignore = true
                - severity = warning
          receivers:
            - name: blackhole
            - name: homelab
              slack_configs:
                - api_url: "{{ "{{ .slack_api_url }}" }}"
                  channel: homelab
                  send_resolved: true
                  title: '[{{ "{{ `{{` }}" }} .Status | toUpper {{ "{{ `}}` }}" }}{{ "{{ `{{` }}" }} if eq .Status "firing" {{ "{{ `}}` }}" }}:{{ "{{ `{{` }}" }} .Alerts.Firing | len {{ "{{ `}}` }}" }}{{ "{{ `{{` }}" }} end {{ "{{ `}}` }}" }}] Monitoring Event Notification'
                  text: |-
                    {{ "{{ `{{` }}" }} if eq .Status "firing" {{ "{{ `}}` }}" }}{{ "{{ `{{` }}" }} if eq .GroupLabels.severity "critical"{{ "{{ `}}` }}" }}<!channel>{{ "{{ `{{` }}" }} end {{ "{{ `}}` }}" }}{{ "{{ `{{` }}" }} end {{ "{{ `}}` }}" }}
                    {{ "{{ `{{` }}" }} range .Alerts {{ "{{ `}}` }}" }}
                      *Summary:* {{ "{{ `{{` }}" }} .Annotations.summary{{ "{{ `}}` }}" }}
                      *Details:*
                      {{ "{{ `{{` }}" }} range .Labels.SortedPairs {{ "{{ `}}` }}" }} • *{{ "{{ `{{` }}" }} .Name {{ "{{ `}}` }}" }}:* `{{ "{{ `{{` }}" }} .Value {{ "{{ `}}` }}" }}`
                      {{ "{{ `{{` }}" }} end {{ "{{ `}}` }}" }}
                    {{ "{{ `{{` }}" }} end {{ "{{ `}}` }}" }}
  data:
    - secretKey: slack_api_url
      remoteRef:
        key: homelab/data/secrets/slack/webhook
        property: url
