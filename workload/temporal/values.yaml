temporal:
  server:
    enabled: true
    config:
      persistence:
        defaultStore: default
        visibilityStore: visibility
        numHistoryShards: 512
        datastores:
          default:
            sql:
              createDatabase: true
              driverName: postgres12_pgx
              pluginName: postgres12_pgx
              connectAddr: temporal-postgresql:5432
              databaseName: temporal
              user: temporal
              existingSecret: temporal-postgresql
              secretKey: user-password
              connectProtocol: tcp
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
          visibility:
            sql:
              createDatabase: true
              driverName: postgres12_pgx
              pluginName: postgres12_pgx
              connectAddr: temporal-postgresql:5432
              host: temporal-postgresql-hl
              databaseName: temporal_visibility
              user: temporal
              existingSecret: temporal-postgresql
              secretKey: user-password
              connectProtocol: tcp
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
  admintools:
    enabled: true
  web:
    enabled: true
    replicaCount: 1
postgresql:
  auth:
    enablePostgresUser: true
    username: temporal
    existingSecret: temporal-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: user-password
      replicationPasswordKey: replication-password
      metricsPasswordKey: metrics-password
  architecture: standalone
