---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linhng98-wildcard-tls
spec:
  secretName: linhng98-wildcard-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-cloudflare-prod
  dnsNames:
    - "*.linhng98.com"
---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: istio-ingressgateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: linhng98-wildcard-tls
      hosts:
        - "*.linhng98.com"
