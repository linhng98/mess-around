argo-cd:
  global:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    statefulsetAnnotations:
      reloader.stakater.com/auto: "true"
  configs:
    cm:
      create: true
      admin.enabled: true
      timeout.reconciliation: 180s
      timeout.hard.reconciliation: 0s
      application.instanceLabelKey: argocd.argoproj.io/instance
  controller:
    name: application-controller
    replicas: 1
    args:
      appResyncPeriod: "60"
    metrics: &metrics
      enabled: true
      serviceMonitor:
        enabled: true
  dex:
    enabled: true
    metrics: *metrics
  redis:
    enabled: true
    metrics: *metrics
  server:
    enabled: true
    metrics: *metrics
    ingress:
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: HTTPS
        cert-manager.io/cluster-issuer: letsencrypt-route53-prod
      ingressClassName: nginx
      hostname: argocd.homelab.linhng98.com
      tls: true
  repoServer:
    enabled: true
    metrics: *metrics
  applicationSet:
    enabled: true
    metrics: *metrics
argo-rollouts:
  installCRDs: true
  keepCRDs: true
  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  dashboard:
    enabled: true
