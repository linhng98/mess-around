---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: rook-s3
spec:
  provider:
    kubernetes:
      remoteNamespace: rook-s3
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: external-secrets
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets
